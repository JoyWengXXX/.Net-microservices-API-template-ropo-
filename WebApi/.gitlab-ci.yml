stages:
  - cleanup
  - build
  - detect-changes
  - build-and-push-docker
  - generate-release
  - deploy

variables:
  # Harbor Registry и®їе?дЄ≠е?и®≠е?
  # ?ѓзФ± GitLab CI/CD Variables и¶ЖеѓЂпЉИжФѓ??Environment-scopedпЉ?  # ж≥®ж?пЉЪHARBOR_PROJECT ??dotenv artifacts ?Рд?пЉМд??®ж≠§еЃЪзЊ©дї•йБњ?НиҐЂ?Їе??Їз©Ї??  # ?•и®≠зљЃз°ђзЈ®зҐЉ?Ри®≠?Љж?е∞ОиЗі?А?ЙзТ∞еҐГйГљдљњзФ®?Мд???Harbor project
  HARBOR_REGISTRY: ${HARBOR_REGISTRY:-WRONG_FROM_GITLAB_CI_DEFAULT:8888}
  # Build Configuration
  NUGET_PACKAGES: "/tmp/nuget-packages"
  DOCKER_BUILDKIT: 1
  GIT_STRATEGY: fetch
  # Force rebuild all services (set to "true" to bypass change detection)
  FORCE_ALL: "false"
  # ?®е?ењЂе?и®≠зљЃ

cache:
  key: ${CI_COMMIT_REF_SLUG}-dotnet-${CI_PIPELINE_ID}
  paths:
    - $NUGET_PACKAGES
    - .nuget/
    - '*/*/obj/project.assets.json'
    - '*/*/obj/*.csproj.nuget.*'
  policy: pull-push
  when: on_success

workflow:
  rules:
    # ??merge request дЇЛдїґ?ВиІЄ?Љп??®жЦЉ CI ж™ҐжЯ•пЉ?    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # ??dev ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "dev"
    # ??master ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "master"
    # ??qa ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "qa"
    # ??production ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "production"
    # ??interdev ?ЖжФѓиІЄзЩЉпЉИжЄђи©¶зТ∞еҐГп?
    - if: $CI_COMMIT_BRANCH == "interdev"
    # ??interqa ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "interqa"
    # ??inter ?ЖжФѓиІЄзЩЉ
    - if: $CI_COMMIT_BRANCH == "inter"

# =============================================================================
# Cleanup Stage

# =============================================================================
cleanup:
  stage: cleanup
  tags:
    - docker  # <--- ?Щи£°е∞Нж?дљ†е??ЗдЄ≠??Tags жђДд?
    - egmiot
  script:
    - echo "жЄЕз?зЈ©е?..."
    - rm -rf $NUGET_PACKAGES
    - rm -rf .nuget/
    - rm -rf SystemMain_WebApi/*/obj/project.assets.json
    - rm -rf SystemMain_WebApi/*/obj/*.csproj.nuget.*

# =============================================================================
# Build Stage

# =============================================================================
build:
  stage: build
  tags:
    - docker  # <--- ?Щи£°е∞Нж?дљ†е??ЗдЄ≠??Tags жђДд?
    - egmiot
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore ./SystemMain_WebApi/SystemMain_WebApi.slnx
    - dotnet build ./SystemMain_WebApi/SystemMain_WebApi.slnx --configuration Release

# =============================================================================
# Detect Changes Stage

# =============================================================================
detect-changes:
  stage: detect-changes
  tags:
    - docker  # <--- ?Щи£°е∞Нж?дљ†е??ЗдЄ≠??Tags жђДд?
    - egmiot
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "qa" || $CI_COMMIT_BRANCH == "production" || $CI_COMMIT_BRANCH == "interdev" || $CI_COMMIT_BRANCH == "interqa" || $CI_COMMIT_BRANCH == "inter"'
      when: on_success
  before_script:
    - apk add --no-cache bash git
  script:
    - chmod +x SystemMain_WebApi/scripts/*.sh
    - cd SystemMain_WebApi
    - ./scripts/detect-changes.sh "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" "changed-services.env"
    - cat changed-services.env
    # ?єж??ЖжФѓ?Єж?е∞Нж???env ж™Фп??Ґз?дєЊжЈ®??dotenvпЉИзІї?§и®їиІ??
    - |
      ENV_FILE=""
      case "$CI_COMMIT_BRANCH" in
        dev)      ENV_FILE="env.dev" ;;
        interdev) ENV_FILE="env.interdev" ;;
        interqa)  ENV_FILE="env.interqa" ;;
        inter)    ENV_FILE="env.inter" ;;
        master)   ENV_FILE="env.dev" ;;
        qa)       ENV_FILE="env.qa" ;;
        production) ENV_FILE="env.production" ;;
      esac
      if [ -n "$ENV_FILE" ] && [ -f "$ENV_FILE" ]; then
        echo "[INFO] ?Ґз? dotenv еЊ?$ENV_FILE ..."
        grep -v '^#' "$ENV_FILE" | grep -v '^$' > env.dotenv
        cat env.dotenv
      else
        echo "[INFO] ?°е???env ж™Фп?еїЇз?з©?dotenv"
        touch env.dotenv
      fi
  artifacts:
    paths:
      - SystemMain_WebApi/changed-services.env
    reports:
      dotenv: SystemMain_WebApi/env.dotenv
    expire_in: 1 day

# =============================================================================
# Docker Build Base Configuration

# =============================================================================
.build-docker-base:
  stage: build-and-push-docker
  image: docker:27-cli  # дљњзФ®?ЕеРЂ docker CLI ?Дж??Пж?
  tags:
    - docker  # <--- ?Щи£°е∞Нж?дљ†е??ЗдЄ≠??Tags жђДд?
    - egmiot
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "qa" || $CI_COMMIT_BRANCH == "production" || $CI_COMMIT_BRANCH == "interdev" || $CI_COMMIT_BRANCH == "interqa" || $CI_COMMIT_BRANCH == "inter"'
      when: on_success
  needs:
    - job: build
      artifacts: false
    - job: detect-changes
      artifacts: true
  before_script:
    - |
      docker info
      # зҐЇд?еЊ?dotenv artifacts ?НжЦ∞иЉЙеЕ•?∞е?иЃКжХЄпЉИйШ≤ж≠Ґдљњ?®еИ∞?ѓи™§?Дй?и®≠еАЉп?
      if [ -f "SystemMain_WebApi/env.dotenv" ]; then
        echo "[DEBUG] еЊ?env.dotenv ?НжЦ∞иЉЙеЕ•?∞е?иЃКжХЄ..."
        set -a
        source SystemMain_WebApi/env.dotenv
        set +a
      else
        echo "[DEBUG] env.dotenv дЄНе??®п??єзФ® dotenv ж≥®еЕ•?ДзТ∞еҐГи???
      fi
      # й©Чи?ењЕи??∞е?иЃКжХЄпЉИеД™?Из?пЉЪCI/CD Variables > dotenvпЉ?      echo "[DEBUG] HARBOR_REGISTRY=${HARBOR_REGISTRY:-?™и®≠еЃЪ}"
      echo "[DEBUG] HARBOR_PROJECT=${HARBOR_PROJECT:-?™и®≠еЃЪ}"
      if [ -z "${HARBOR_PROJECT:-}" ]; then
        echo "[ERROR] HARBOR_PROJECT ?™и®≠еЃЪп?иЂЛж™Ґ??dotenv artifacts ??CI/CD Variables"
        exit 1
      fi
      echo "[DEBUG] Harbor CA ??docker login ж™ҐжЯ•..."
      if [ -n "${HARBOR_CA_PEM_B64:-}" ] && [ -n "${HARBOR_REGISTRY:-}" ]; then
        echo "[DEBUG] еЃЙи? Harbor CA ??docker trust: ${HARBOR_REGISTRY} (for dind)"
        mkdir -p /certs/client
        echo "${HARBOR_CA_PEM_B64}" | base64 -d > /certs/client/ca.crt
        chmod 0644 /certs/client/ca.crt
        mkdir -p "/etc/docker/certs.d/${HARBOR_REGISTRY}"
        cp /certs/client/ca.crt "/etc/docker/certs.d/${HARBOR_REGISTRY}/ca.crt"
      fi
      echo "[DEBUG] Login to Docker Registry..."
      if [ -n "$HARBOR_ROBOT_USER" ] && [ -n "$HARBOR_ROBOT_PASSWORD" ] && [ -n "$HARBOR_REGISTRY" ]; then
        echo "$HARBOR_ROBOT_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_ROBOT_USER" --password-stdin
      fi
      # Load change detection results
      source SystemMain_WebApi/changed-services.env || true
      echo "Changed services: ${CHANGED_SERVICES:-none}"
      echo "Build all: ${BUILD_ALL:-false}"

