# =============================================================================
# Generate Release Manifest Stage

# =============================================================================
generate-release-env:
  stage: generate-release
  tags:
    - docker  # <--- ?Щи£°е∞Нж?дљ†е??ЗдЄ≠??Tags жђДд?
    - egmiot
  image: alpine:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: '$CI_COMMIT_BRANCH == "dev" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "qa" || $CI_COMMIT_BRANCH == "production" || $CI_COMMIT_BRANCH == "interdev" || $CI_COMMIT_BRANCH == "interqa" || $CI_COMMIT_BRANCH == "inter"'
      when: on_success
  needs:
    - job: detect-changes
      artifacts: true
    - job: build-and-push-docker-group-1
      artifacts: false
    - job: build-and-push-docker-group-2
      artifacts: false
    - job: build-and-push-docker-group-3
      artifacts: false
    - job: build-and-push-docker-group-4
      artifacts: false
    - job: build-and-push-docker-group-5
      artifacts: false
    - job: build-and-push-docker-group-6
      artifacts: false
    - job: build-and-push-docker-group-7
      artifacts: false
    - job: build-and-push-docker-group-8
      artifacts: false
    - job: build-and-push-docker-group-9
      artifacts: false
    - job: build-and-push-docker-db-migration
      artifacts: false
  before_script:
    - apk add --no-cache bash git curl
  script:
    - chmod +x SystemMain_WebApi/scripts/*.sh
    - cd SystemMain_WebApi
    # ?§жЦЈ?∞е??Нз®±
    - |
      case "$CI_COMMIT_BRANCH" in
        dev) ENV_NAME="dev" ;;
        master) ENV_NAME="dev" ;;
        qa) ENV_NAME="qa" ;;
        production) ENV_NAME="production" ;;
        interdev) ENV_NAME="interdev" ;;
        interqa) ENV_NAME="interqa" ;;
        inter) ENV_NAME="inter" ;;
        *) ENV_NAME="dev" ;;
      esac
    # дЄЛи??Нд???release.envпЉИе??Ье??®п?
    - |
      PREV_RELEASE_FILE=""
      if [ -n "$RELEASE_ENV_URL" ]; then
        curl -sSL -o "prev-release.${ENV_NAME}.env" "$RELEASE_ENV_URL" && PREV_RELEASE_FILE="prev-release.${ENV_NAME}.env" || echo "?°ж?дЄЛи??Нд???release.env"
      fi
    # ?Ґз??∞з? release.env
    - ./scripts/generate-release-env.sh "$ENV_NAME" "changed-services.env" "$PREV_RELEASE_FILE" "release.${ENV_NAME}.env"
    - cat "release.${ENV_NAME}.env"
  artifacts:
    paths:
      - SystemMain_WebApi/release.*.env
    expire_in: 30 days
# ==================== Deploy ж®°жЭњпЉИдљњ??GCP IAP TunnelпЉ?===================
# ?≥жЬђдљНзљЃ: SystemMain_WebApi/scripts/deploy/deploy.sh
# ?∞е?и®≠е?: SystemMain_WebApi/scripts/deploy/.env.deploy.${ENV}
# ?Аи¶Бз? CI/CD Variables:
#   - GCP_SERVICE_ACCOUNT_KEY: base64 encoded service account JSON
#   - GCP_PROJECT_ID: GCP project ID
#   - REGISTRY_USER: Docker Registry еЄ≥и?
#   - REGISTRY_PASSWORD: Docker Registry еѓЖзҐЉ
.deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  tags:
    - docker
    - egmiot
  environment:
    name: $CI_COMMIT_BRANCH
  variables:
    ENV: '$CI_COMMIT_BRANCH'
    # ?ІеИґ?ѓеР¶?Ји?и≥Зж?еЇ?MigrationпЉИй?и®≠д??Ји?пЉМй??Ле?иІЄзЩЉ?Ви®≠??trueпЉ?    RUN_MIGRATION: "false"
  before_script:
    - apk add --no-cache openssl
    # е∞?CI/CD ?∞е?иЃКжХЄиљЙж??Їе?еѓ?    - export ENV="$(echo "$CI_COMMIT_BRANCH" | tr '[:upper:]' '[:lower:]')"
    - echo "ENV=$ENV"
    # GCP и™Ни?
    - echo "$GCP_SERVICE_ACCOUNT_KEY" | base64 -d > /tmp/gcp-key.json
    - gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
    - gcloud config set project "$GCP_PROJECT_ID"
    # иЉЙеЕ•?∞е?и®≠е??Це? TARGET_VM ??GCP_ZONE
    - source SystemMain_WebApi/scripts/deploy/.env.deploy.${ENV}
    # еїЇз? Docker Registry и™Ни?и®≠е?
    - |
      mkdir -p /tmp/docker_conf
      AUTH=$(echo -n "$REGISTRY_USER:$REGISTRY_PASSWORD" | base64 -w 0)
      cat > /tmp/docker_conf/config.json << EOF
      {
        "auths": {
          "$REGISTRY": {
            "auth": "$AUTH"
          }
        }
      }
      EOF
    # SSH ???жЄђи©¶?Зй?и©¶п?з≠Йе? OS Login SSH еѓЖйС∞?≥жТ≠пЉ?    - |
      echo "зҐЇд? SSH еѓЖйС∞еЈ≤ж≠£зҐЇй?зљ?.."
      MAX_RETRIES=5
      RETRY_COUNT=0
      while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
        echo "жЄђи©¶ SSH ?????$TARGET_VM (?Чи©¶ $((RETRY_COUNT + 1))/$MAX_RETRIES)..."
        if gcloud compute ssh "$TARGET_VM" --zone="$GCP_ZONE" --quiet --tunnel-through-iap --command="echo 'SSH ????Ре?'" 2>&1; then
          echo "SSH ???й©Чи??Ъй?"
          break
        else
          RETRY_COUNT=$((RETRY_COUNT + 1))
          if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
            echo "SSH ???е§±ж?пЉМз?еЊ?10 зІТе??Ни©¶..."
            sleep 10
          else
            echo "SSH ???е§±ж?пЉМеЈ≤?Фж?е§Ій?и©¶жђ°??
            echo "?Чи©¶?НжЦ∞?Яж? SSH еѓЖйС∞..."
            rm -rf ~/.ssh/google_compute_*
            gcloud compute config-ssh --remove
            exit 1
          fi
        fi
      done
  script:
    - chmod +x SystemMain_WebApi/scripts/deploy/deploy.sh
    - ./SystemMain_WebApi/scripts/deploy/deploy.sh ${ENV}

deploy:
  extends:
    - .deploy
  rules:
    # ?™еЬ®?Чд?и≠Је??ѓеЯЈи°МйГ®зљ≤п?дЄНеЬ® MR ?ОжЃµ?Ји?
    # dev ?ЖжФѓ?Ле??®зљ≤
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: manual
    # master ?ЖжФѓ?™е??®зљ≤
    - if: '$CI_COMMIT_BRANCH == "master" && $AUTO_DEPLOY == "true"'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "master"'
      when: manual
    # qa ?ЖжФѓ?™е??®зљ≤
    - if: '$CI_COMMIT_BRANCH == "qa" && $AUTO_DEPLOY == "true"'
      when: on_success
